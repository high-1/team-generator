<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Generator</title>
<style>
  :root {
    --bg: #f4f5f9;
    --bg2: #eaecf4;
    --card: #ffffff;
    --ink: #15171d;
    --muted: #71778a;
    --line: #e8eaf1;
    --line-strong: #d9dce6;
    --accent: #4f46e5;
    --accent-2: #7c6cf5;
    --accent-soft: #ecebfe;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow-sm: 0 1px 2px rgba(20,24,45,.05);
    --shadow: 0 2px 6px rgba(20,24,45,.05), 0 14px 34px rgba(20,24,45,.07);
    --shadow-lg: 0 10px 20px rgba(20,24,45,.09), 0 28px 56px rgba(20,24,45,.13);
    --ease-spring: cubic-bezier(.22, 1, .36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background:
      radial-gradient(1100px 520px at 50% -8%, #ffffff 0%, var(--bg) 58%, var(--bg2) 100%) fixed;
  }
  .wrap {
    max-width: 940px;
    margin: 0 auto;
    padding: 56px 24px 90px;
  }
  header.top {
    text-align: center;
    margin-bottom: 40px;
  }
  header.top h1 {
    font-size: 34px;
    font-weight: 680;
    letter-spacing: -0.03em;
    margin: 0 0 8px;
    background: linear-gradient(118deg, #1c1e26 12%, #4f46e5 96%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header.top p {
    margin: 0;
    color: var(--muted);
    font-size: 15.5px;
  }
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 20px;
  }
  .row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  label.lbl {
    font-size: 12.5px;
    font-weight: 650;
    color: var(--muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
  }
  select, input[type="number"], input[type="text"], button, textarea {
    font-family: inherit;
    font-size: 14.5px;
    color: var(--ink);
  }
  select, input[type="number"], input[type="text"] {
    padding: 10px 13px;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    background: #fff;
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  select:focus, input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .list-controls select { flex: 1; min-width: 180px; }
  .icon-btn {
    border: 1px solid var(--line-strong);
    background: #fff;
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 550;
    color: var(--muted);
    transition: background .18s, color .18s, border-color .18s, transform .05s;
    white-space: nowrap;
  }
  .icon-btn:hover { background: #fafbff; color: var(--ink); border-color: var(--accent); }
  .icon-btn:active { transform: translateY(1px); }
  textarea {
    width: 100%;
    min-height: 180px;
    padding: 14px 16px;
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    resize: vertical;
    outline: none;
    line-height: 1.75;
    transition: border-color .18s, box-shadow .18s;
  }
  .count-hint {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
  }
  .options-grid {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
  }
  .mode-toggle {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .mode-toggle button {
    border: none;
    background: transparent;
    padding: 9px 16px;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 580;
    color: var(--muted);
    transition: background .2s var(--ease-spring), color .2s, box-shadow .2s;
  }
  .mode-toggle button.active {
    background: #fff;
    color: var(--accent);
    box-shadow: 0 1px 3px rgba(20,24,45,.12);
  }
  input[type="number"].amount { width: 96px; }
  .generate {
    position: relative;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border: none;
    padding: 13px 30px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 640;
    letter-spacing: 0.01em;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(79,70,229,.30), inset 0 1px 0 rgba(255,255,255,.20);
    transition: transform .12s var(--ease-spring), box-shadow .2s, filter .2s;
  }
  .generate:hover { transform: translateY(-2px); box-shadow: 0 11px 24px rgba(79,70,229,.36), inset 0 1px 0 rgba(255,255,255,.24); }
  .generate:active { transform: translateY(0); }
  .generate:disabled { cursor: default; filter: saturate(.7) brightness(.98); transform: none; box-shadow: 0 4px 12px rgba(79,70,229,.22); }

  .results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
    margin-top: 8px;
  }
  .team {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--team) 5%, #fff), #fff);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    opacity: 0;
    transform: translateY(16px) scale(.97);
    transition: transform .28s var(--ease-spring), box-shadow .28s;
  }
  .team::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--team), color-mix(in srgb, var(--team) 55%, #fff));
  }
  .team.show { animation: cardIn .55s var(--ease-spring) forwards; }
  .team.rest { opacity: 1; transform: none; }
  .team.rest:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }
  .team h3 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 670;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--team, var(--accent));
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--team) 16%, transparent);
    flex: none;
  }
  .team .meta { font-size: 12px; color: var(--muted); font-weight: 550; margin-left: auto; }
  .team ul { margin: 0; padding: 0; list-style: none; }
  .team li {
    padding: 6px 2px;
    font-size: 14.5px;
    border-bottom: 1px solid var(--line);
    transition: color .2s;
  }
  .team li:last-child { border-bottom: none; }
  .team li.rolling { color: var(--muted); opacity: .55; }
  .team li.settled { animation: settlePop .34s var(--ease-spring); }
  @keyframes settlePop {
    0% { opacity: .3; transform: translateX(-6px); }
    60% { transform: translateX(1px); }
    100% { opacity: 1; transform: none; }
  }
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14.5px;
    padding: 36px 0;
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius);
    background: rgba(255,255,255,.4);
  }
  .toast {
    position: fixed;
    bottom: 26px; left: 50%;
    transform: translateX(-50%) translateY(24px);
    background: var(--ink);
    color: #fff;
    padding: 11px 18px;
    border-radius: 12px;
    font-size: 13.5px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s var(--ease-spring), transform .25s var(--ease-spring);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 520px) {
    .wrap { padding: 36px 16px 64px; }
    header.top h1 { font-size: 27px; }
    .options-grid { flex-direction: column; }
  }
  @media (prefers-reduced-motion: reduce) {
    .team.show { animation: none; }
    .team { opacity: 1; transform: none; }
    .team li.settled { animation: none; }
    .toast, .generate, .team { transition: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Team Generator</h1>
    <p>Drop in names, pick how to split them, and shuffle.</p>
  </header>

  <!-- List management -->
  <section class="panel">
    <label class="lbl">Saved lists</label>
    <div class="row list-controls">
      <select id="listSelect" aria-label="Select a saved list"></select>
      <button class="icon-btn" id="newList">+ New</button>
      <button class="icon-btn" id="renameList">Rename</button>
      <button class="icon-btn" id="deleteList">Delete</button>
    </div>
  </section>

  <!-- Names -->
  <section class="panel">
    <label class="lbl" for="names">Names — one per line</label>
    <textarea id="names" placeholder="Avery&#10;Blake&#10;Casey&#10;Drew&#10;Emerson"></textarea>
    <div class="count-hint" id="countHint">0 names</div>
  </section>

  <!-- Options -->
  <section class="panel">
    <div class="options-grid">
      <div>
        <label class="lbl">Split by</label>
        <div class="mode-toggle" id="modeToggle">
          <button data-mode="groups" class="active">Number of teams</button>
          <button data-mode="size">People per team</button>
        </div>
      </div>
      <div>
        <label class="lbl" id="amountLabel">How many teams?</label>
        <input type="number" class="amount" id="amount" min="1" value="2">
      </div>
    </div>
    <div class="row" style="margin-top: 22px;">
      <button class="generate" id="generate">Generate teams</button>
    </div>
  </section>

  <!-- Results -->
  <section id="resultsWrap">
    <div class="empty" id="emptyState">Your teams will appear here.</div>
    <div class="results" id="results"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  var LS_KEY = "teamgen.v1";
  var palette = [
    "#4f46e5", "#0891b2", "#16a34a", "#ea580c",
    "#db2777", "#9333ea", "#ca8a04", "#0d9488",
    "#dc2626", "#2563eb", "#65a30d", "#c026d3"
  ];
  var reduceMotion = window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---- State ----
  var state = load();

  // ---- Elements ----
  var $ = function (id) { return document.getElementById(id); };
  var listSelect = $("listSelect");
  var namesEl = $("names");
  var countHint = $("countHint");
  var amountEl = $("amount");
  var amountLabel = $("amountLabel");
  var modeToggle = $("modeToggle");
  var resultsEl = $("results");
  var emptyState = $("emptyState");
  var generateBtn = $("generate");
  var mode = "groups";
  var busy = false;

  // ---- Persistence ----
  function load() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.lists && parsed.lists.length) return parsed;
      }
    } catch (e) {}
    var id = uid();
    return { lists: [{ id: id, name: "My List", names: "" }], current: id };
  }
  function save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function uid() { return "l" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function currentList() {
    return state.lists.filter(function (l) { return l.id === state.current; })[0] || state.lists[0];
  }

  // ---- Rendering list controls ----
  function renderListOptions() {
    listSelect.innerHTML = "";
    state.lists.forEach(function (l) {
      var opt = document.createElement("option");
      opt.value = l.id;
      opt.textContent = l.name;
      if (l.id === state.current) opt.selected = true;
      listSelect.appendChild(opt);
    });
  }
  function loadCurrentIntoEditor() {
    namesEl.value = currentList().names || "";
    updateCount();
  }
  function updateCount() {
    var n = parseNames().length;
    countHint.textContent = n + (n === 1 ? " name" : " names");
  }
  function parseNames() {
    return namesEl.value.split("\n")
      .map(function (s) { return s.trim(); })
      .filter(function (s) { return s.length; });
  }

  // ---- Events: list management ----
  listSelect.addEventListener("change", function () {
    state.current = listSelect.value;
    save();
    loadCurrentIntoEditor();
  });
  $("newList").addEventListener("click", function () {
    var name = prompt("Name this list:", "List " + (state.lists.length + 1));
    if (name === null) return;
    name = name.trim() || ("List " + (state.lists.length + 1));
    var id = uid();
    state.lists.push({ id: id, name: name, names: "" });
    state.current = id;
    save();
    renderListOptions();
    loadCurrentIntoEditor();
  });
  $("renameList").addEventListener("click", function () {
    var l = currentList();
    var name = prompt("Rename list:", l.name);
    if (name === null) return;
    l.name = name.trim() || l.name;
    save();
    renderListOptions();
  });
  $("deleteList").addEventListener("click", function () {
    if (state.lists.length === 1) { toast("Can't delete your only list."); return; }
    if (!confirm("Delete \"" + currentList().name + "\"?")) return;
    state.lists = state.lists.filter(function (l) { return l.id !== state.current; });
    state.current = state.lists[0].id;
    save();
    renderListOptions();
    loadCurrentIntoEditor();
  });

  // ---- Events: editing names (auto-save) ----
  namesEl.addEventListener("input", function () {
    currentList().names = namesEl.value;
    updateCount();
    save();
  });

  // ---- Events: mode toggle ----
  Array.prototype.forEach.call(modeToggle.querySelectorAll("button"), function (btn) {
    btn.addEventListener("click", function () {
      mode = btn.getAttribute("data-mode");
      Array.prototype.forEach.call(modeToggle.querySelectorAll("button"), function (b) {
        b.classList.toggle("active", b === btn);
      });
      amountLabel.textContent = mode === "groups" ? "How many teams?" : "People per team?";
    });
  });

  // ---- Grouping logic ----
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function intoGroups(people, n) {
    var teams = [];
    for (var i = 0; i < n; i++) teams.push([]);
    people.forEach(function (p, i) { teams[i % n].push(p); });
    return teams;
  }
  function bySize(people, size) {
    var n = Math.max(1, Math.ceil(people.length / size));
    return intoGroups(people, n);
  }

  // ---- Generate ----
  function generate() {
    if (busy) return;
    var people = parseNames();
    if (people.length === 0) { toast("Add some names first."); return; }
    var amount = parseInt(amountEl.value, 10);
    if (isNaN(amount) || amount < 1) { toast("Enter a number of 1 or more."); return; }

    var teams;
    if (mode === "groups") {
      teams = intoGroups(shuffle(people), Math.min(amount, people.length));
    } else {
      teams = bySize(shuffle(people), amount);
    }
    animateReveal(teams, people);
  }

  function setBusy(on) {
    busy = on;
    generateBtn.disabled = on;
    generateBtn.textContent = on ? "Shuffling…" : "Generate teams";
  }

  function renderTeams(teams) {
    resultsEl.innerHTML = "";
    teams.forEach(function (team, i) {
      var color = palette[i % palette.length];
      var card = document.createElement("div");
      card.className = "team";
      card.style.setProperty("--team", color);
      var lis = team.map(function (m) {
        return '<li class="rolling" data-final="' + esc(m) + '">&nbsp;</li>';
      }).join("");
      card.innerHTML =
        '<h3><span class="dot"></span>Team ' + (i + 1) +
        '<span class="meta">' + team.length + (team.length === 1 ? " person" : " people") + '</span></h3>' +
        '<ul>' + lis + '</ul>';
      resultsEl.appendChild(card);
    });
  }

  function animateReveal(teams, pool) {
    emptyState.style.display = "none";
    renderTeams(teams);
    var cards = Array.prototype.slice.call(resultsEl.querySelectorAll(".team"));

    if (reduceMotion) {
      // No motion: just place final names and rest state immediately.
      cards.forEach(function (c) { c.classList.add("rest"); });
      Array.prototype.forEach.call(resultsEl.querySelectorAll("li"), function (li) {
        li.textContent = li.getAttribute("data-final");
        li.classList.remove("rolling");
      });
      return;
    }

    setBusy(true);

    // Staggered spring entrance; switch to a hover-able "rest" state when done.
    cards.forEach(function (c, i) {
      setTimeout(function () { c.classList.add("show"); }, i * 80);
      c.addEventListener("animationend", function onEnd(e) {
        if (e.animationName === "cardIn") {
          c.classList.remove("show");
          c.classList.add("rest");
          c.removeEventListener("animationend", onEnd);
        }
      });
    });

    // Slot-machine settle: lines scramble through the pool, then lock one by one.
    var lis = Array.prototype.slice.call(resultsEl.querySelectorAll("li"));
    var settleBase = 360, perLine = 55;
    lis.forEach(function (li, i) { li._settleAt = settleBase + i * perLine; });

    var start = performance.now();
    var tick = setInterval(function () {
      var now = performance.now() - start;
      var allDone = true;
      lis.forEach(function (li) {
        if (li._settled) return;
        if (now >= li._settleAt) {
          li.textContent = li.getAttribute("data-final");
          li.classList.remove("rolling");
          li.classList.add("settled");
          li._settled = true;
        } else {
          allDone = false;
          li.textContent = pool[Math.floor(Math.random() * pool.length)];
        }
      });
      if (allDone) { clearInterval(tick); setBusy(false); }
    }, 60);
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---- Toast ----
  var toastTimer;
  function toast(msg) {
    var t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }

  generateBtn.addEventListener("click", generate);

  // ---- Init ----
  renderListOptions();
  loadCurrentIntoEditor();
})();
</script>
</body>
</html>
